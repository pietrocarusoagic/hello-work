name: Infrastructure Deploy

on:
  push:
    branches:
      - main
    paths:
      - "infra/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  TF_WORKING_DIR: infra
  ARM_SUBSCRIPTION_ID: aa9de1ef-b9ca-4053-88a0-7f11d2a197fa
  ARM_TENANT_ID: d5e193bb-0b46-467d-9d95-03eb0d012c42
  ARM_CLIENT_ID: f11a1b61-52b2-45a7-8bf9-109194d255e4
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        run: |
          az login --service-principal \
            --username f11a1b61-52b2-45a7-8bf9-109194d255e4 \
            --password "${{ secrets.ARM_CLIENT_SECRET }}" \
            --tenant d5e193bb-0b46-467d-9d95-03eb0d012c42
          az account set --subscription aa9de1ef-b9ca-4053-88a0-7f11d2a197fa

      - name: Resolve GitHub Actions SP object ID
        id: sp
        run: |
          OBJECT_ID=$(az ad sp show --id f11a1b61-52b2-45a7-8bf9-109194d255e4 --query id -o tsv)
          echo "object_id=$OBJECT_ID" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.10"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        # Local state: each CI run starts with an empty state file.
        # For the POC, run terraform apply once locally or trigger this
        # pipeline once. Subsequent runs are idempotent — Terraform will
        # reconcile existing Azure resources against the desired config.
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var="sql_admin_password=${{ secrets.SQL_ADMIN_PASSWORD }}" \
            -var="github_actions_sp_object_id=${{ steps.sp.outputs.object_id }}" \
            -var="aad_client_id=${{ secrets.AAD_CLIENT_ID }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -var-file=environments/prod.tfvars \
            -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 7

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan
