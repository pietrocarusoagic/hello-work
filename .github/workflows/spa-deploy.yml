name: Frontend SPA Deploy

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  STATIC_WEB_APP_NAME: stapp-hellowork
  NODE_VERSION: "22"

jobs:
  build-and-deploy:
    name: Build & Deploy to Static Web Apps
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Build (Vite)
        working-directory: frontend
        run: npm run build
        # No VITE_API_BASE_URL needed — the SPA uses a relative /api path.
        # Front Door routes /api/* to the Container App on the same hostname.

      - name: Azure Login
        run: |
          az login --service-principal \
            --username f11a1b61-52b2-45a7-8bf9-109194d255e4 \
            --password "${{ secrets.ARM_CLIENT_SECRET }}" \
            --tenant d5e193bb-0b46-467d-9d95-03eb0d012c42
          az account set --subscription aa9de1ef-b9ca-4053-88a0-7f11d2a197fa

      - name: Retrieve Static Web App deployment token
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name ${{ env.STATIC_WEB_APP_NAME }} \
            --query 'properties.apiKey' -o tsv)
          echo "deployment_token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.deployment_token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend"
          output_location: "dist"
